name: CI

defaults:
  run:
    shell: bash

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libssl-dev \
            xvfb

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: |
          set +e
          xvfb-run cargo test --all-features --lib > /tmp/lib_out 2>&1
          set -e
          cat /tmp/lib_out
          grep -q "^test result: FAILED" /tmp/lib_out && exit 1
          grep -q "^test result: ok" /tmp/lib_out || exit 1
          xvfb-run cargo test --all-features --tests

      - name: Lint
        run: cargo clippy --all-features -- -D warnings
