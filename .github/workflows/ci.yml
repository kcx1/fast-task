name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    runs-on: ubuntu-latest
    container: rust:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y \
            libgtk-3-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libssl-dev \
            xvfb \
            libgl1-mesa-dri \
            libegl1 \
            mesa-vulkan-drivers

      - name: Add clippy
        run: rustup component add clippy

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        env:
          LIBGL_ALWAYS_SOFTWARE: "1"
          RUST_BACKTRACE: "1"
        run: |
          output=$(xvfb-run cargo test --all-features --verbose 2>&1)
          EXIT=$?
          echo "$output"
          # PoloDB 5.x triggers a pthread cleanup crash (SIGABRT) after tests complete.
          # Cargo exits 101 when its child dies from a signal. Treat this as success only
          # when the test output confirms all tests passed and none failed.
          if [ $EXIT -ne 0 ] && echo "$output" | grep -qE '^test result: ok\.' && ! echo "$output" | grep -q 'FAILED'; then
            echo "Tests passed; ignoring post-test cleanup crash"
            exit 0
          fi
          exit $EXIT


      - name: Lint
        run: cargo clippy --all-features -- -D warnings
