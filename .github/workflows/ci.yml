name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libssl-dev \
            xvfb \
            libgl1-mesa-dri \
            libegl1 \
            mesa-vulkan-drivers

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        env:
          LIBGL_ALWAYS_SOFTWARE: "1"
          RUST_BACKTRACE: "1"
          CARGO_TERM_COLOR: never
        run: |
          # PoloDB 5.x is RocksDB-backed; RocksDB's background threads race the C++
          # static teardown at process exit and abort (SIGABRT) *after* every test has
          # already run and passed. cargo reports that child signal death as exit 101,
          # so the exit code alone can't distinguish "real failure" from "benign
          # post-test crash". We stream the output, capture cargo's real exit code, and
          # decide pass/fail from the test summary instead.
          #
          # --no-fail-fast is load-bearing: without it cargo stops at the first binary
          # that exits non-zero, so a crash in an early binary would skip the rest and
          # let a partial run masquerade as success. With it, every binary runs to
          # completion and "no FAILED anywhere" actually means all tests passed.
          #
          # Note: `output=$(cmd)` cannot be used here — GitHub runs this with `set -e`,
          # under which a failing command substitution aborts the step before we can
          # inspect the result.
          set +e
          xvfb-run cargo test --no-fail-fast --all-features --verbose 2>&1 | tee test-output.log
          EXIT=${PIPESTATUS[0]}
          set -e

          if [ "$EXIT" -eq 0 ]; then
            exit 0
          fi

          if grep -qE '^test result: ok' test-output.log && ! grep -q 'FAILED' test-output.log; then
            echo "::warning::All tests passed; tolerating known PoloDB/RocksDB post-test cleanup crash (cargo exit $EXIT)"
            exit 0
          fi

          echo "Tests failed (cargo exit $EXIT)"
          exit "$EXIT"


      - name: Lint
        run: cargo clippy --all-features -- -D warnings
