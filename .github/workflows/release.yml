name: Release

permissions:
  contents: write
  pull-requests: write

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update CHANGELOG
        id: changelog
        continue-on-error: true
        uses: requarks/changelog-action@v1
        with:
          token: ${{ github.token }}
          tag: ${{ github.ref_name }}

      - name: Create Release
        uses: ncipollo/release-action@v1.12.0
        with:
          allowUpdates: true
          draft: false
          makeLatest: true
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.changes || 'Initial release.' }}
          token: ${{ github.token }}

      - name: Commit CHANGELOG.md to a branch
        id: commit-changelog
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          branch: chore/changelog-${{ github.ref_name }}
          create_branch: true
          commit_message: 'docs: update CHANGELOG.md for ${{ github.ref_name }} [skip ci]'
          file_pattern: CHANGELOG.md

      - name: Open and merge changelog PR
        if: steps.commit-changelog.outputs.changes_detected == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --repo "${{ github.repository }}" \
            --base main \
            --head "chore/changelog-${{ github.ref_name }}" \
            --title "docs: update CHANGELOG.md for ${{ github.ref_name }}" \
            --body "Automated changelog update for ${{ github.ref_name }}."

          gh pr merge \
            --repo "${{ github.repository }}" \
            "chore/changelog-${{ github.ref_name }}" \
            --squash --delete-branch

  upload-assets:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libssl-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: fast-task
          target: ${{ matrix.target }}
          tar: unix
          zip: all
          archive: $bin-$tag-$target
          token: ${{ secrets.GITHUB_TOKEN }}
